<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Analytics | SmartAgro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/modern-theme.css">

<!-- Highcharts -->
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/accessibility.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>
</head>

<body class="analytics-page">

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="container">
  <div class="header">
    <h1 data-i18n="analyticsTitle">Field Analytics</h1>
    <p data-i18n="analyticsDesc">
      Real-time insights into temperature, humidity, and soil moisture
      helping farmers take data-driven irrigation decisions.
    </p>
  </div>

  <div class="grid">
    <div class="chart-card"><div id="tempChart"></div></div>
    <div class="chart-card"><div id="humChart"></div></div>
    <div class="chart-card"><div id="moistChart"></div></div>
  </div>
</div>

<footer>
  <span data-i18n="analyticsFooter">© 2025 SmartAgro Analytics — Growing with Data</span>
</footer>

<!-- NAVBAR LOAD + ACTIVE -->
<script src="js/firebase-init.js"></script>
<script src="js/navbar.js"></script>
<script src="js/number-localization.js"></script>

<!-- ANALYTICS LOGIC -->
<script>
const auth = window.auth;
const db = window.db;
const DAILY_LIMIT = 10;

const HISTORY_PATHS = [
  uid => `user/${uid}/sensorHistory`,
  uid => `user/${uid}/sensorReadings`,
  uid => `user/${uid}/history/sensor`,
  uid => `user/${uid}/sensor`
];

let tempChart, humChart, moistChart;
const ANALYTICS_LANGUAGE_STORAGE_KEY = 'smartagro_language';

const I18N = {
  en: {
    analyticsTitle: 'Field Analytics',
    analyticsDesc: 'Real-time insights into temperature, humidity, and soil moisture helping farmers take data-driven irrigation decisions.',
    analyticsFooter: '© 2025 SmartAgro Analytics — Growing with Data',
    tempTrend: 'Temperature Trend',
    humTrend: 'Humidity Trend',
    moistTrend: 'Soil Moisture Trend',
    tempSeries: 'Temperature',
    humSeries: 'Humidity',
    moistSeries: 'Moisture'
  },
  hi: {
    analyticsTitle: 'क्षेत्र विश्लेषण',
    analyticsDesc: 'तापमान, आर्द्रता और मिट्टी की नमी पर रियल-टाइम जानकारी, जिससे किसान डेटा-आधारित सिंचाई निर्णय ले सकें।',
    analyticsFooter: '© 2025 स्मार्टएग्रो विश्लेषण — डेटा के साथ बढ़ती खेती',
    tempTrend: 'तापमान ट्रेंड',
    humTrend: 'आर्द्रता ट्रेंड',
    moistTrend: 'मिट्टी नमी ट्रेंड',
    tempSeries: 'तापमान',
    humSeries: 'आर्द्रता',
    moistSeries: 'नमी'
  },
  mr: {
    analyticsTitle: 'शेती विश्लेषण',
    analyticsDesc: 'तापमान, आर्द्रता आणि मातीतील ओलावा याबाबत रिअल-टाइम माहिती, ज्यामुळे शेतकरी डेटा-आधारित सिंचन निर्णय घेऊ शकतात.',
    analyticsFooter: '© 2025 स्मार्टअ‍ॅग्रो विश्लेषण — डेटासह वाढणारी शेती',
    tempTrend: 'तापमान कल',
    humTrend: 'आर्द्रता कल',
    moistTrend: 'माती ओलावा कल',
    tempSeries: 'तापमान',
    humSeries: 'आर्द्रता',
    moistSeries: 'ओलावा'
  }
};

function getCurrentLanguage() {
  const lang = localStorage.getItem(ANALYTICS_LANGUAGE_STORAGE_KEY) || 'en';
  return I18N[lang] ? lang : 'en';
}

function t(lang, key) {
  return (I18N[lang] && I18N[lang][key]) || I18N.en[key] || key;
}

function applyPageLanguage(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (!key) return;
    el.textContent = t(lang, key);
  });

  if (tempChart && humChart && moistChart) {
    tempChart.update({
      title: { text: t(lang, 'tempTrend') },
      series: [{ name: t(lang, 'tempSeries') }]
    }, true, false, false);

    humChart.update({
      title: { text: t(lang, 'humTrend') },
      series: [{ name: t(lang, 'humSeries') }]
    }, true, false, false);

    moistChart.update({
      title: { text: t(lang, 'moistTrend') },
      series: [{ name: t(lang, 'moistSeries') }]
    }, true, false, false);
  }

}

function normalizeHeader(text) {
  return String(text || '').toLowerCase().replace(/[^a-z]/g, '');
}

function parseExcelDate(value) {
  if (value instanceof Date && Number.isFinite(value.getTime())) return value.getTime();
  if (typeof value === 'number' && Number.isFinite(value)) {
    const parsed = XLSX.SSF.parse_date_code(value);
    if (!parsed) return NaN;
    return Date.UTC(parsed.y, parsed.m - 1, parsed.d, parsed.H || 0, parsed.M || 0, parsed.S || 0);
  }
  const dt = new Date(String(value || '').trim());
  return Number.isFinite(dt.getTime()) ? dt.getTime() : NaN;
}

function findColumnValue(row, aliases) {
  const entries = Object.entries(row || {});
  for (const [key, val] of entries) {
    const normalized = normalizeHeader(key);
    if (aliases.includes(normalized)) return val;
  }
  return undefined;
}

function parseRowsFromSheet(rows) {
  const parsed = [];

  rows.forEach(row => {
    const dateVal = findColumnValue(row, ['date', 'day', 'datetime', 'timestamp']);
    const tempVal = findColumnValue(row, ['temperature', 'temp']);
    const humVal = findColumnValue(row, ['humidity', 'hum']);
    const moistVal = findColumnValue(row, ['moisture', 'soilmoisture', 'moist']);

    const ts = parseExcelDate(dateVal);
    const temperature = Number(tempVal);
    const humidity = Number(humVal);
    const moisture = Number(moistVal);

    if (!Number.isFinite(ts)) return;
    if (!Number.isFinite(temperature) && !Number.isFinite(humidity) && !Number.isFinite(moisture)) return;

    parsed.push({
      t: ts,
      Temperature: Number.isFinite(temperature) ? temperature : null,
      Humidity: Number.isFinite(humidity) ? humidity : null,
      Moisture: Number.isFinite(moisture) ? moisture : null
    });
  });

  return parsed.sort((a, b) => a.t - b.t);
}

function setAxisMinMax(chart, values) {
  if (!chart) return;
  if (!values.length) {
    chart.yAxis[0].setExtremes(null, null, false, false);
    return;
  }
  let min = Math.min(...values);
  let max = Math.max(...values);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const pad = (max - min) * 0.08;
  chart.yAxis[0].setExtremes(min - pad, max + pad, false, false);
}

function applyExcelDataToCharts(readings) {
  const tempSeries = buildSeries(readings, 'Temperature');
  const humSeries = buildSeries(readings, 'Humidity');
  const moistSeries = buildSeries(readings, 'Moisture');

  tempChart.series[0].setData(tempSeries, false);
  humChart.series[0].setData(humSeries, false);
  moistChart.series[0].setData(moistSeries, false);

  setAxisMinMax(tempChart, tempSeries.map(p => p[1]));
  setAxisMinMax(humChart, humSeries.map(p => p[1]));
  setAxisMinMax(moistChart, moistSeries.map(p => p[1]));

  tempChart.redraw();
  humChart.redraw();
  moistChart.redraw();
}

async function handleExcelFile(file) {
  if (!file) return;
  try {
    const buffer = await file.arrayBuffer();
    const workbook = XLSX.read(buffer, { type: 'array' });
    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: null, raw: true });

    if (!rows.length) {
      return false;
    }

    const hasRequiredColumns = Object.keys(rows[0] || {}).some(k => ['date', 'day', 'datetime', 'timestamp'].includes(normalizeHeader(k)))
      && Object.keys(rows[0] || {}).some(k => ['temperature', 'temp'].includes(normalizeHeader(k)))
      && Object.keys(rows[0] || {}).some(k => ['humidity', 'hum'].includes(normalizeHeader(k)))
      && Object.keys(rows[0] || {}).some(k => ['moisture', 'soilmoisture', 'moist'].includes(normalizeHeader(k)));

    if (!hasRequiredColumns) {
      return false;
    }

    const parsed = parseRowsFromSheet(rows);
    if (!parsed.length) {
      return false;
    }

    applyExcelDataToCharts(parsed);
    return true;
  } catch (err) {
    console.warn('excel load failed', err && err.message);
    return false;
  }
}

function getFileNameFromPath(path) {
  const sheetId = extractGoogleSheetId(path);
  if (sheetId) return `${sheetId}.xlsx`;
  const normalized = String(path || '').replace(/\\/g, '/');
  const parts = normalized.split('/');
  return parts[parts.length - 1] || 'data.xlsx';
}

function extractGoogleSheetId(path) {
  const text = String(path || '').replace(/\\/g, '/').trim();
  const match = text.match(/docs\.google\.com\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/i);
  return match ? match[1] : '';
}

function getGoogleSheetGid(path) {
  const text = String(path || '').trim();
  const gidMatch = text.match(/[?&#]gid=(\d+)/i);
  return gidMatch ? gidMatch[1] : '';
}

function toGoogleSheetExportUrl(path) {
  const sheetId = extractGoogleSheetId(path);
  if (!sheetId) return '';
  const gid = getGoogleSheetGid(path);
  const gidQuery = gid ? `&gid=${gid}` : '';
  return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=xlsx${gidQuery}`;
}

function toReadableFileUrl(path) {
  const raw = String(path || '').trim().replace(/^['"]+|['"]+$/g, '');
  if (!raw) return '';
  const sheetExportUrl = toGoogleSheetExportUrl(raw);
  if (sheetExportUrl) return sheetExportUrl;
  if (/^https?:\/\//i.test(raw) || /^file:\/\//i.test(raw)) return encodeURI(raw);

  const normalized = raw.replace(/\\/g, '/');
  if (/^[a-zA-Z]:\//.test(normalized)) {
    return encodeURI(`file:///${normalized}`);
  }

  if (/^\\\\/.test(raw)) {
    return encodeURI(`file:${raw}`);
  }

  // Reject short/relative fragments like "edit[1]" to avoid bad local fetch URLs.
  const looksRelative = !normalized.includes('/') && !normalized.includes('\\');
  if (looksRelative) return '';

  return encodeURI(normalized);
}

async function loadExcelFromSavedPath(path) {
  const url = toReadableFileUrl(path);
  if (!url) return false;

  try {
    const response = await withTimeout(fetch(url), 12000, 'excel_path_timeout');
    if (!response.ok) throw new Error('excel_path_http_error');
    const blob = await response.blob();
    const file = new File([blob], getFileNameFromPath(path), {
      type: blob.type || 'application/octet-stream'
    });
    return await handleExcelFile(file);
  } catch (err) {
    console.warn('saved excel path load failed', err && err.message);
    return false;
  }
}
async function autoLoadExcelFromProfile(uid) {
  try {
    const snap = await db.ref(`user/${uid}/profile`).once('value');
    const profile = snap.val() || {};
    const path = String(profile.excelPath || '').trim();
    if (!path) return false;
    return await loadExcelFromSavedPath(path);
  } catch (err) {
    console.warn('excel path read failed', err && err.message);
    return false;
  }
}

function withTimeout(promise, ms, timeoutCode) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      reject(new Error(timeoutCode || 'timeout'));
    }, ms);

    promise
      .then(value => {
        clearTimeout(timer);
        resolve(value);
      })
      .catch(err => {
        clearTimeout(timer);
        reject(err);
      });
  });
}

function initCharts(){
  const lang = getCurrentLanguage();
  tempChart = Highcharts.chart('tempChart',{
    title:{ text:t(lang, 'tempTrend') },
    xAxis:{ type:'datetime' },
    yAxis:{ title:{ text:'°C' }},
    series:[{ name:t(lang, 'tempSeries'), data:[] }]
  });

  humChart = Highcharts.chart('humChart',{
    title:{ text:t(lang, 'humTrend') },
    xAxis:{ type:'datetime' },
    yAxis:{ title:{ text:'%' }},
    series:[{ name:t(lang, 'humSeries'), data:[] }]
  });

  moistChart = Highcharts.chart('moistChart',{
    title:{ text:t(lang, 'moistTrend') },
    xAxis:{ type:'datetime' },
    yAxis:{ title:{ text:'%' }},
    series:[{ name:t(lang, 'moistSeries'), data:[] }]
  });
}

function normalizeTimestamp(ts, fallback){
  let n = Number(ts ?? fallback ?? Date.now());
  if (!Number.isFinite(n) || n <= 0) n = Date.now();
  if (n < 1e11) n *= 1000;
  return n;
}

function toReading(node, fallbackTs){
  if (!node || typeof node !== 'object' || Array.isArray(node)) return null;

  const temp = Number(node.Temperature ?? node.temperature ?? node.temp);
  const hum = Number(node.Humidity ?? node.humidity);
  const moist = Number(node.Moisture ?? node.moisture ?? node.soilMoisture);

  const hasValue = Number.isFinite(temp) || Number.isFinite(hum) || Number.isFinite(moist);
  if (!hasValue) return null;

  return {
    t: normalizeTimestamp(node.Timestamp ?? node.timestamp ?? node.ts, fallbackTs),
    Temperature: Number.isFinite(temp) ? temp : null,
    Humidity: Number.isFinite(hum) ? hum : null,
    Moisture: Number.isFinite(moist) ? moist : null
  };
}

function extractReadings(raw){
  const out = [];

  function walk(node, fallbackTs, depth){
    if (!node || typeof node !== 'object' || depth > 4) return;

    if (Array.isArray(node)) {
      node.forEach(item => walk(item, fallbackTs, depth + 1));
      return;
    }

    const ownReading = toReading(node, fallbackTs);
    if (ownReading) out.push(ownReading);

    Object.entries(node).forEach(([key, value]) => {
      if (!value || typeof value !== 'object') return;
      const keyTs = Number(key);
      const nextFallback = Number.isFinite(keyTs) ? normalizeTimestamp(keyTs) : (ownReading ? ownReading.t : fallbackTs);
      walk(value, nextFallback, depth + 1);
    });
  }

  walk(raw, Date.now(), 0);
  return out.sort((a, b) => a.t - b.t);
}

function localDayKey(ts){
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function sampleMaxPerDay(readings, limit){
  const byDay = new Map();

  readings.forEach(reading => {
    const key = localDayKey(reading.t);
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(reading);
  });

  const sampled = [];

  [...byDay.keys()].sort().forEach(day => {
    const dayReadings = byDay.get(day).sort((a, b) => a.t - b.t);
    if (dayReadings.length <= limit) {
      sampled.push(...dayReadings);
      return;
    }

    const picks = [];
    const step = (dayReadings.length - 1) / (limit - 1);
    for (let i = 0; i < limit; i += 1) {
      const idx = Math.round(i * step);
      picks.push(dayReadings[idx]);
    }
    sampled.push(...picks);
  });

  return sampled.sort((a, b) => a.t - b.t);
}

function buildSeries(readings, key){
  return readings
    .filter(r => Number.isFinite(r[key]))
    .map(r => [r.t, r[key]]);
}

function renderTrend(readings){
  const sampled = sampleMaxPerDay(readings, DAILY_LIMIT);

  tempChart.series[0].setData(buildSeries(sampled, 'Temperature'), true);
  humChart.series[0].setData(buildSeries(sampled, 'Humidity'), true);
  moistChart.series[0].setData(buildSeries(sampled, 'Moisture'), true);
}

async function resolveBestHistoryPath(uid){
  let best = { path: null, count: 0 };

  for (const makePath of HISTORY_PATHS) {
    const path = makePath(uid);
    try {
      const snap = await db.ref(path).once('value');
      const readings = extractReadings(snap.val());
      if (readings.length > best.count) {
        best = { path, count: readings.length };
      }
    } catch (err) {
      console.warn('history probe failed', path, err && err.message);
    }
  }

  return best.path;
}

async function loadTrendForUser(uid){
  const historyPath = await resolveBestHistoryPath(uid);
  if (!historyPath) {
    renderTrend([]);
    return;
  }

  db.ref(historyPath).on('value', snap => {
    const readings = extractReadings(snap.val());
    renderTrend(readings);
  }, err => {
    console.warn('history subscription failed', historyPath, err && err.message);
  });
}

auth.onAuthStateChanged(async user=>{
  if(!user){
    location.href="sign_in.html";
    return;
  }
initNavbarUser(user);
  applyPageLanguage(getCurrentLanguage());
  initCharts();

  const uid=user.uid;
  const loadedFromExcel = await autoLoadExcelFromProfile(uid);
  if (!loadedFromExcel) {
    await loadTrendForUser(uid);
  }
});

document.addEventListener('language-changed', (event) => {
  const lang = event?.detail?.lang || getCurrentLanguage();
  applyPageLanguage(lang);
});
</script>

</body>
</html>
